name: Build Android AAB
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Generate Keystore
        run: |
          keytool -genkeypair -keystore signing.jks -alias kaas \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -dname "CN=Kaas,O=KaasApp,C=IQ"
          echo "=== SHA256 ==="
          keytool -list -v -keystore signing.jks -alias kaas \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" | grep SHA256
      - name: Build TWA
        run: |
          mkdir app && cd app
          npx @bubblewrap/cli init \
            --manifest "https://fork-continuation.replit.app/manifest.json" \
            --directory .
          npx @bubblewrap/cli build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: kaas-aab
          path: app/*.aab
          retention-days: 30
